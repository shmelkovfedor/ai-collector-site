<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Collector — голосовой AI-агент для коллекторских агентств</title>
  <meta name="description" content="Compliance из коробки. Запуск за две недели. Открытое ценообразование впервые на рынке российских коллекторских ПКО.">

  <!-- Geist font from Google Fonts CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500;600&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       AI-Collector — Design Tokens
       Source: <vault>/Проекты/AI-Collector/DESIGN.md
       ============================================ */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0D1421;
      --bg-alt: #0a1019;
      --bg-surface: #131C2C;
      --ink: #FFFFFF;
      --ink-muted: rgba(255,255,255,0.65);
      --ink-subtle: rgba(255,255,255,0.45);
      --ink-quiet: rgba(255,255,255,0.30);
      --accent: #FF6B47;
      --accent-deep: #E04E29;
      --accent-soft: rgba(255,107,71,0.12);
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.10);
      --hairline: rgba(255,255,255,0.06);
      --font-sans: 'Geist', -apple-system, system-ui, sans-serif;
      --font-mono: 'Geist Mono', ui-monospace, monospace;
      --text-xs: 11px;
      --text-sm: 13px;
      --text-base: 15px;
      --text-md: 17px;
      --text-lg: 20px;
      --text-xl: 24px;
      --text-2xl: 32px;
      --text-3xl: 42px;
      --text-4xl: 54px;
      --text-hero: 72px;
      --ls-tight: -0.02em;
      --ls-normal: 0;
      --ls-wide: 0.04em;
      --ls-extra: 2px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;
      --space-20: 80px;
      --space-24: 96px;
      --space-32: 128px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
    }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body { overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--space-10);
    }

    @media (max-width: 768px) {
      .container { padding: 0 var(--space-6); }
    }

    /* ============================================
       Components
       ============================================ */

    .eyebrow {
      font-size: var(--text-xs);
      letter-spacing: var(--ls-extra);
      text-transform: uppercase;
      color: var(--ink-subtle);
      font-weight: 500;
      display: inline-block;
      margin-bottom: var(--space-4);
    }

    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--space-6);
    }

    .glass-card-metric {
      font-family: var(--font-mono);
      font-size: var(--text-3xl);
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .glass-card-label {
      font-size: var(--text-xs);
      color: var(--ink-subtle);
      margin-top: var(--space-2);
      letter-spacing: var(--ls-wide);
      text-transform: uppercase;
    }

    .cta-primary {
      background: var(--accent);
      color: var(--bg);
      padding: 14px 26px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: var(--text-sm);
      letter-spacing: 0.2px;
      transition: background-color 120ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .cta-primary:hover { background: var(--accent-deep); }

    .cta-ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--ink-quiet);
      padding: 13px 24px;
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: var(--text-sm);
      transition: border-color 120ms ease-out, background-color 120ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .cta-ghost:hover {
      border-color: var(--ink-subtle);
      background: rgba(255,255,255,0.02);
    }

    .voice-wave {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 200px;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ============================================
       Top Navigation
       ============================================ */

    .nav {
      background: var(--bg);
      padding: var(--space-5) 0;
      border-bottom: 1px solid var(--hairline);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-weight: 700;
      font-size: var(--text-md);
      letter-spacing: var(--ls-tight);
      color: var(--ink);
    }

    .nav-links {
      display: flex;
      gap: var(--space-8);
    }

    .nav-link {
      color: var(--ink-muted);
      font-size: var(--text-sm);
      transition: color 120ms ease-out;
    }

    .nav-link:hover { color: var(--ink); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <div class="nav-logo">AI-Collector</div>
      <div class="nav-links">
        <a href="#product" class="nav-link">Продукт</a>
        <a href="#compliance" class="nav-link">Compliance</a>
        <a href="#pricing" class="nav-link">Цены</a>
        <a href="#faq" class="nav-link">FAQ</a>
      </div>
      <a href="#pilot" class="cta-primary">Запустить пилот →</a>
    </div>
  </nav>

  <script>
    /* JS будет добавлен в Task 14 */
  </script>
</body>
</html>
